# ───────────────────────────────────────────────────────────────
# ORNAS — Cross-Platform Release Workflow
# ───────────────────────────────────────────────────────────────
# Triggers on version tags (v*), builds for Linux/Windows/macOS,
# and uploads all binaries to a GitHub Release.
#
# Tauri v2 · React + Vite · Rust · npm
# ───────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v*'

  # Allow manual triggering from the Actions tab
  workflow_dispatch:

# Required for creating/updating GitHub Releases
permissions:
  contents: write

jobs:
  release:
    # Guard against RPM bundler hangs (known Tauri issue on Linux CI).
    # Normal builds complete in ~20 min; 60 min gives plenty of headroom
    # while still catching infinite hangs.
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────
          - platform: ubuntu-22.04
            rust_targets: ''
            args: ''

          # ── Windows ────────────────────────────────────────
          - platform: windows-latest
            rust_targets: ''
            args: ''

          # ── macOS (Apple Silicon) ──────────────────────────
          - platform: macos-latest
            rust_targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin

          # ── macOS (Intel) ──────────────────────────────────
          - platform: macos-latest
            rust_targets: x86_64-apple-darwin
            args: --target x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      # ────────────────────────────────────────────────────────
      # 1. Checkout
      # ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ────────────────────────────────────────────────────────
      # 2. Node.js
      # ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      # ────────────────────────────────────────────────────────
      # 3. Rust
      # ────────────────────────────────────────────────────────
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust cross-compilation target
        if: matrix.rust_targets != ''
        run: rustup target add ${{ matrix.rust_targets }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # ────────────────────────────────────────────────────────
      # 4. System Dependencies (Linux only)
      # ────────────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ────────────────────────────────────────────────────────
      # 5. Install frontend dependencies
      # ────────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ────────────────────────────────────────────────────────
      # 6. Build Tauri app & create GitHub Release
      # ────────────────────────────────────────────────────────
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # ── macOS Code Signing (optional) ──────────────────
          # Uncomment and configure these if you have an
          # Apple Developer certificate for signed builds.
          # See "Setup Instructions" below for details.
          #
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

          # ── macOS Notarization (optional) ──────────────────
          # Required for Gatekeeper-approved distribution.
          #
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ORNAS ${{ github.ref_name }}'
          releaseBody: |
            ## ORNAS ${{ github.ref_name }}

            Download the installer for your platform below.

            | Platform | File |
            |----------|------|
            | **Linux (Debian/Ubuntu)** | `.deb` |
            | **Linux (Fedora/RHEL)** | `.rpm` |
            | **Linux (Universal)** | `.AppImage` |
            | **Windows** | `.msi` or `.exe` |
            | **macOS** | `.dmg` |

            ---

            > First beta release? See the [README](https://github.com/sanromarth/ornas) for installation instructions.
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
